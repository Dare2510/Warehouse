services:
  db:
    image: mysql:8.4
    container_name: warehouse-database
    environment:
      MYSQL_DATABASE: warehouse
      MYSQL_USER: warehouse
      MYSQL_PASSWORD: warehouse
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3308:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 30

  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: warehouse-app
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_URL: jdbc:mysql://db:3306/warehouse
      DB_USERNAME: warehouse
      DB_PASSWORD: warehouse
      JWT_SECRET: super-secret-key-which-is-long-enough
      JWT_EXPIRATION_MS: 3600000

volumes:
  mysql_data: